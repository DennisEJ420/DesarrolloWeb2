<div class="expense-card bg-white border rounded shadow-sm mx-auto w-100" style="max-width: 540px;">
  
  <div class="text-center py-3 border-bottom">
    <h2 class="expense-title m-0">Ingresar Gasto</h2>
  </div>
  
  <div class="p-4">
    <form> 
      
      <div class="mb-3">
        <label class="form-label expense-label">Gasto</label>
        <input 
          type="text" 
          class="form-control expense-input" 
          placeholder="Ej: Comida..">
      </div>
      
      <div class="mb-4">
        <label class="form-label expense-label">Cantidad</label>
        <input 
          type="number" 
          class="form-control expense-input" 
          placeholder="0"
          min="0">
      </div>
      
      <button type="submit" class="btn w-100 btn-expense text-uppercase">
        Agregar Gasto
      </button>
      
    </form>
  </div>

</div>
