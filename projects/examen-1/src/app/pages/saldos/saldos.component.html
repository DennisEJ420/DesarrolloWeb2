<div class="expense-list-card bg-white border rounded shadow-sm mx-auto w-100" style="max-width: 540px;">

  <div class="text-center py-3 border-bottom">
    <h2 class="list-title m-0">Listado de Gastos</h2>
  </div>

  <div class="p-4">

    <div class="row g-3 mb-4">

      <div class="col-6">
        <div class="status-box box-budget p-4 rounded text-center text-sm-start">
          <span class="status-label">
            Presupuesto:
            <strong class="text-dark-green">
              ${{ presupuesto }}
            </strong>
          </span>
        </div>
      </div>

      <div class="col-6">
        <div class="status-box box-remaining p-4 rounded text-center text-sm-start">
          <span class="status-label">
            Restante:
            <strong>
              ${{ restante }}
            </strong>
          </span>
        </div>
      </div>

    </div>

    <div class="expense-items-container">

      <div class="d-flex justify-content-between align-items-center py-2 border-bottom-dashed">

        <span class="item-name fw-bold">
          {{ gasto }}
        </span>

        <span class="badge rounded-pill item-amount-badge">
          ${{ monto }}
        </span>

      </div>

    </div>

  </div>

</div>
