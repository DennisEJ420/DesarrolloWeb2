<h1>Esto es una prueba</h1>

<section>
    <article>
        
        <h2>
            Counter Component Page
        </h2>
        <button (click)="increaseBy(1)">+1</button>
        <button (click)="increaseBy(-1)">-1</button>
        <button (click)="reset()">Reset</button>

        <h3>
            El valor del counter es: {{contador}} <!-- se agrega la variable desde counter.ts -->
        </h3>
        <h3>
            El valor del counter con señal es: {{contadorSignal()}} <!-- se usan los paréntesis para recibir el valor inicial de la Signal -->
        </h3>

    </article>

</section>
