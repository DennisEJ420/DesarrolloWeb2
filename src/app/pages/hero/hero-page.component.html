<h1>
    {{ name }}
</h1>
<div>
    <table>
        <tr>
            <td>Nombre:</td>
            <td>{{ name }}</td>
        </tr>
        <tr>
            <td>Edad:</td>
            <td>{{ age }}</td>
        </tr>
        <tr>
            <td>Metodo:</td>
            <td>{{ getHeroDescription() }}</td>
        </tr>
        <tr>
            <td>Capitalizado:</td>
            <td>{{ name.toUpperCase() }}</td>
        </tr>
    </table>
</div>

<div>
    <table>
        <tr>
        </tr>
    </table>
</div>

<div class="button-container"> <!--agrega el DIV para controlar los botones en el CSS-->
    <button class="btn btn-primary mx-2" (click)="cambiarHero()"> <!--se agregan los eventos del click-->
        Cambiar Nombre
    </button>
    <button class="btn btn-primary mx-2" (click)="cambiarEdad()">
        Cambiar Edad
    </button>
    <button class="btn btn-primary mx-2" (click)="reset()">
        Reset
    </button>

</div>
